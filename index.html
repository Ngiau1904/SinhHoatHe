<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Điểm sinh hoạt hè thiếu nhi
  </title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial, sans-serif;

      background:
      linear-gradient(
        rgba(255,255,255,0.15),
        rgba(255,255,255,0.15)
      ),

      url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2070&auto=format&fit=crop');

      background-size:cover;

      background-position:center;

      /* FIX MOBILE */
      background-attachment:scroll;

      min-height:100vh;

      padding:20px;

    }

    h1{

      text-align:center;

      color:white;

      font-size:42px;

      margin-bottom:30px;

      line-height:1.4;

      text-shadow:
      2px 2px 10px rgba(0,0,0,0.4);

    }

    #search{

      width:100%;

      max-width:700px;

      display:block;

      margin:0 auto 25px auto;

      padding:14px 18px;

      border:none;

      border-radius:14px;

      font-size:17px;

      outline:none;

    }

    #list{

      max-width:900px;

      margin:auto;

    }

    .card{

      background:rgba(255,255,255,0.95);

      border-radius:25px;

      padding:22px;

      margin-bottom:20px;

      box-shadow:
      0 8px 20px rgba(0,0,0,0.15);

      transition:0.3s;

    }

    .card:hover{

      transform:translateY(-3px);

    }

    .card h2{

      color:#ff4081;

      font-size:32px;

      line-height:1.3;

      margin-bottom:18px;

      word-break:break-word;

    }

    .info{

      margin:10px 0;

      font-size:18px;

      color:#333;

      line-height:1.5;

      white-space:pre-line;

      word-break:break-word;

    }

    .phone{

      color:#0d6efd;

      font-weight:bold;

    }

    .button-group{

      margin-top:18px;

    }

    .btn{

      display:inline-block;

      background:#28a745;

      color:white;

      text-decoration:none;

      padding:12px 20px;

      border-radius:14px;

      font-size:17px;

      transition:0.3s;

    }

    .btn:hover{

      opacity:0.9;

    }

    .footer{

      text-align:center;

      margin-top:30px;

      color:white;

      font-size:18px;

      text-shadow:
      1px 1px 5px rgba(0,0,0,0.5);

    }

    .loading{

      text-align:center;

      color:white;

      font-size:22px;

    }

    /* MOBILE */

    @media(max-width:768px){

      body{

        padding:12px;

      }

      h1{

        font-size:26px;

        line-height:1.4;

        margin-bottom:20px;

      }

      #search{

        font-size:16px;

        padding:12px 14px;

      }

      .card{

        padding:18px;

        border-radius:22px;

        margin-bottom:16px;

      }

      .card h2{

        font-size:24px;

        line-height:1.35;

        margin-bottom:14px;

      }

      .info{

        font-size:16px;

        line-height:1.5;

        margin:8px 0;

      }

      .btn{

        width:100%;

        text-align:center;

        font-size:16px;

        padding:12px;

      }

      .footer{

        font-size:15px;

      }

    }

  </style>

</head>

<body>

  <h1>

    🌈 Các điểm sinh hoạt hè thiếu nhi Xã Bình Hưng 🎈

  </h1>

  <input
    type="text"
    id="search"
    placeholder="🔍 Tìm kiếm địa điểm..."
  />

  <div id="list">

    <div class="loading">

      Đang tải dữ liệu...

    </div>

  </div>

  <div class="footer">

    ☀️ Chúc các em có một mùa hè thật vui vẻ ☀️

  </div>

  <script>

    // FILE JSON
    const JSON_URL = "./diem.json";

    let allData = [];

    // HIỂN THỊ DỮ LIỆU
    function renderData(data){

      const list = document.getElementById("list");

      // KHÔNG CÓ DỮ LIỆU
      if(data.length === 0){

        list.innerHTML = `

          <div class="card">

            ❌ Không tìm thấy dữ liệu

          </div>

        `;

        return;
      }

      // RESET
      list.innerHTML = "";

      // RENDER
      data.forEach(item => {

        list.innerHTML += `

          <div class="card">

            <h2>

              📍 ${item.STT}. ${item.ViTri}

            </h2>

            <div class="info">

              ⏰ <b>Thời gian:</b>

              ${item.ThoiGian}

            </div>

            <div class="info phone">

              📞 <b>SĐT:</b> ${item.Sdt}

            </div>

            <div class="info">

              👨‍🏫 <b>Phụ trách:</b>

              ${item.PhuTrach}

            </div>

            <div class="button-group">

              ${
                item.LinkMap

                ?

                `
                <a
                  class="btn"
                  target="_blank"
                  href="${item.LinkMap}"
                >
                  📍 Chỉ đường
                </a>
                `

                :

                `
                <a
                  class="btn"
                  target="_blank"
                  href="https://www.google.com/maps/search/${encodeURIComponent(item.ViTri)}"
                >
                  📍 Chỉ đường
                </a>
                `
              }

            </div>

          </div>

        `;

      });

    }

    // LOAD JSON
    fetch(JSON_URL)

      .then(response => {

        if(!response.ok){

          throw new Error(
            "Không tải được file JSON"
          );

        }

        return response.json();

      })

      .then(data => {

        allData = data;

        renderData(allData);

      })

      .catch(error => {

        document.getElementById("list").innerHTML = `

          <div class="card">

            ❌ Không tải được dữ liệu JSON

          </div>

        `;

        console.error(error);

      });

    // TÌM KIẾM
    document

      .getElementById("search")

      .addEventListener("input", function(){

        const keyword =
        this.value.toLowerCase();

        const filtered =
        allData.filter(item => {

          return (

            item.ViTri
            .toLowerCase()
            .includes(keyword)

            ||

            item.PhuTrach
            .toLowerCase()
            .includes(keyword)

          );

        });

        renderData(filtered);

      });

  </script>

</body>

</html>
