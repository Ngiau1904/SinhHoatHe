<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Điểm sinh hoạt hè thiếu nhi</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial, sans-serif;

      background:
      linear-gradient(
        rgba(255,255,255,0.15),
        rgba(255,255,255,0.15)
      ),

      url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2070&auto=format&fit=crop');

      background-size:cover;
      background-position:center;
      background-attachment:fixed;

      min-height:100vh;

      padding:30px;
    }

    h1{

      text-align:center;

      color:white;

      font-size:45px;

      margin-bottom:40px;

      text-shadow:2px 2px 10px rgba(0,0,0,0.4);

    }

    #search{

      width:100%;

      max-width:700px;

      display:block;

      margin:0 auto 30px auto;

      padding:15px;

      border:none;

      border-radius:15px;

      font-size:18px;

      outline:none;

    }

    #list{

      max-width:1000px;

      margin:auto;

    }

    .card{

  background:rgba(255,255,255,0.92);

  border-radius:25px;

  padding:18px;

  margin-bottom:18px;

  box-shadow:0 8px 20px rgba(0,0,0,0.2);

  transition:0.3s;

}

    .card:hover{

      transform:translateY(-5px) scale(1.01);

    }

   .card h2{

  color:#ff4081;

  margin-bottom:10px;

  font-size:28px;

}

    .info{

  margin:6px 0;

  font-size:18px;

  color:#333;

  line-height:1.4;

  white-space:pre-line;

}

    .phone{

      color:#0d6efd;

      font-weight:bold;

    }

    .button-group{

      margin-top:20px;

      display:flex;

      gap:10px;

      flex-wrap:wrap;

    }

    .btn{

      border:none;

      padding:12px 18px;

      border-radius:12px;

      cursor:pointer;

      font-size:16px;

      text-decoration:none;

      color:white;

      transition:0.3s;

    }

    .map-btn{

      background:#28a745;

    }

    .btn:hover{

      opacity:0.85;

    }

    .footer{

      text-align:center;

      margin-top:40px;

      color:white;

      font-size:18px;

      text-shadow:1px 1px 5px rgba(0,0,0,0.5);

    }

    .loading{

      text-align:center;

      color:white;

      font-size:22px;

    }

    @media(max-width:768px){

      h1{
        font-size:30px;
      }

      .card{
        padding:18px;
      }

      .card h2{
        font-size:22px;
      }

      .info{
        font-size:16px;
      }

    }

  </style>

</head>

<body>

  <h1>
    🌈 Các điểm sinh hoạt hè thiếu nhi Xã Bình Hưng 🎈
  </h1>

  <input
    type="text"
    id="search"
    placeholder="🔍 Tìm kiếm địa điểm..."
  />

  <div id="list">

    <div class="loading">
      Đang tải dữ liệu...
    </div>

  </div>

  <div class="footer">

    ☀️ Chúc các em có một mùa hè thật vui vẻ ☀️

  </div>

  <script>

    // File JSON cùng thư mục
    const JSON_URL = "./diem.json";

    let allData = [];

    // Hiển thị dữ liệu
    function renderData(data){

      const list = document.getElementById("list");

      // Nếu không có dữ liệu
      if(data.length === 0){

        list.innerHTML = `
          <div class="card">
            ❌ Không tìm thấy dữ liệu
          </div>
        `;

        return;
      }

      // Reset danh sách
      list.innerHTML = "";

      // Render từng item
      data.forEach(item => {

        list.innerHTML += `

          <div class="card">

            <h2>
              📍 ${item.STT}. ${item.ViTri}
            </h2>

            <div class="info">

              ⏰ <b>Thời gian:</b><br>

              ${item.ThoiGian}

            </div>

            <div class="info phone">
              📞 <b>SĐT:</b>  ${item.Sdt}
            </div>

            <div class="info">
              👨‍🏫 <b>Phụ trách:</b><br>
              ${item.PhuTrach}
            </div>

            <div class="button-group">

              ${
                item.LinkMap

                ?

                `
                <a
                  class="btn map-btn"
                  target="_blank"
                  href="${item.LinkMap}"
                >
                  📍 Chỉ đường
                </a>
                `

                :

                `
                <a
                  class="btn map-btn"
                  target="_blank"
                  href="https://www.google.com/maps/search/${encodeURIComponent(item.ViTri)}"
                >
                  📍 Chỉ đường
                </a>
                `
              }

            </div>

          </div>

        `;

      });

    }

    // Load JSON
    fetch(JSON_URL)

      .then(response => {

        if(!response.ok){

          throw new Error("Không tải được file JSON");

        }

        return response.json();

      })

      .then(data => {

        allData = data;

        renderData(allData);

      })

      .catch(error => {

        document.getElementById("list").innerHTML = `

          <div class="card">

            ❌ Không tải được dữ liệu JSON

          </div>

        `;

        console.error(error);

      });

    // Tìm kiếm
    document
      .getElementById("search")

      .addEventListener("input", function(){

        const keyword = this.value.toLowerCase();

        const filtered = allData.filter(item => {

          return (

            item.ViTri.toLowerCase().includes(keyword)

            ||

            item.PhuTrach.toLowerCase().includes(keyword)

          );

        });

        renderData(filtered);

      });

  </script>

</body>

</html>
