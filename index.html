<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Điểm sinh hoạt hè thiếu nhi
  </title>

  <style>

    *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:Arial,sans-serif;

  background:
    linear-gradient(
      rgba(255,255,255,0.15),
      rgba(255,255,255,0.15)
    ),
    url('./background.jpg');

  background-size:cover;

  background-position:center top;

  background-attachment:fixed;

  background-repeat:no-repeat;

  min-height:100vh;

  padding:20px;
}

h1{

  text-align:center;

  color:white;

  font-size:50px;

  margin-bottom:30px;

  line-height:1.4;

  text-shadow:
  2px 2px 10px rgba(0,0,0,0.4);

}

#search{

  width:100%;

  max-width:650px;

  display:block;

  margin:0 auto 30px auto;

  padding:14px 18px;

  border:none;

  border-radius:15px;

  font-size:17px;

  outline:none;
}

#list{

  max-width:900px;

  margin:auto;
}

.card{

  background:rgba(255,255,255,0.95);

  border-radius:24px;

  padding:24px;

  margin-bottom:22px;

  box-shadow:
  0 8px 20px rgba(0,0,0,0.15);

}

.card h2{

  color:#ff4081;

  font-size:28px;

  line-height:1.4;

  margin-bottom:16px;

  word-break:break-word;
}

.info{

  margin:6px 0;

  font-size:17px;

  color:#333;

  line-height:1.5;

  word-break:break-word;
}

.phone{

  color:#0d6efd;

  font-weight:bold;
}

.phu-trach{

  line-height:1.6;
}

.button-group{

  margin-top:18px;
}

.btn{

  display:inline-block;

  background:#28a745;

  color:white;

  text-decoration:none;

  padding:12px 22px;

  border-radius:14px;

  font-size:16px;

  transition:0.3s;
}

.btn:hover{

  opacity:0.9;
}

.footer{

  text-align:center;

  margin-top:30px;

  color:white;

  font-size:18px;

  text-shadow:
  1px 1px 5px rgba(0,0,0,0.5);

}

/* MOBILE */

@media(max-width:768px){

  body{

    padding:12px;
  }
  body::before{

  background-size:120% auto;

  background-position:center top;
}

  h1{

    font-size:28px;

    margin-bottom:20px;
  }

  #search{

    font-size:16px;

    padding:12px 14px;
  }

  .card{

    padding:18px;

    border-radius:22px;

    margin-bottom:16px;
  }

  .card h2{

    font-size:22px;

    margin-bottom:12px;
  }

  .info{

    font-size:16px;

    line-height:1.45;
  }

  .btn{

    width:100%;

    text-align:center;

    font-size:16px;
  }

  .footer{

    font-size:15px;
  }


     .phu-trach{
        
      line-height:1.5;
        
       }
     .thoigian{
      
        display:flex;
      
        align-items:flex-start;
      }

      .thoigian .label{
      
        min-width:130px;
      }

    .thoigian .content{
    
      line-height:1.6;
    }

    }

  </style>

</head>

<body>

  <h1>

    🌈 Các điểm sinh hoạt hè thiếu nhi Xã Bình Hưng 🎈

  </h1>

  <input
    type="text"
    id="search"
    placeholder="🔍 Tìm kiếm địa điểm..."
  />

  <div id="list">

    <div class="loading">

      Đang tải dữ liệu...

    </div>

  </div>

  <div class="footer">

    ☀️ Chúc các em có một mùa hè thật vui vẻ ☀️

  </div>

  <script>

    // FILE JSON
    const JSON_URL = "./diem.json";

    let allData = [];

    // HIỂN THỊ DỮ LIỆU
    function renderData(data){

      const list = document.getElementById("list");

      // KHÔNG CÓ DỮ LIỆU
      if(data.length === 0){

        list.innerHTML = `

          <div class="card">

            ❌ Không tìm thấy dữ liệu

          </div>

        `;

        return;
      }

      // RESET
      list.innerHTML = "";

      // RENDER
      data.forEach(item => {

        list.innerHTML += `

          <div class="card">

            <h2>

              📍 ${item.STT}. ${item.ViTri}

            </h2>

            <div class="info thoigian">

              <span class="label">
                ⏰ <b>Thời gian:</b>
              </span>
            
              <span class="content">
                ${item.ThoiGian.replace('Vào lúc', '<br>Vào lúc')}
              </span>
            
            </div>

            <div class="info phone">

              📞 <b>SĐT:</b> ${item.Sdt}

            </div>

            <div class="info phu-trach">

            👨‍🏫 <b>Phụ trách:</b><br>

            ${item.PhuTrach.replace(/\n/g, "<br>")}

            </div>

            <div class="button-group">

              ${
                item.LinkMap

                ?

                `
                <a
                  class="btn"
                  target="_blank"
                  href="${item.LinkMap}"
                >
                  📍 Chỉ đường
                </a>
                `

                :

                `
                <a
                  class="btn"
                  target="_blank"
                  href="https://www.google.com/maps/search/${encodeURIComponent(item.ViTri)}"
                >
                  📍 Chỉ đường
                </a>
                `
              }

            </div>

          </div>

        `;

      });

    }

    // LOAD JSON
    fetch(JSON_URL)

      .then(response => {

        if(!response.ok){

          throw new Error(
            "Không tải được file JSON"
          );

        }

        return response.json();

      })

      .then(data => {

        allData = data;

        renderData(allData);

      })

      .catch(error => {

        document.getElementById("list").innerHTML = `

          <div class="card">

            ❌ Không tải được dữ liệu JSON

          </div>

        `;

        console.error(error);

      });

    // TÌM KIẾM
    document

      .getElementById("search")

      .addEventListener("input", function(){

        const keyword =
        this.value.toLowerCase();

        const filtered =
        allData.filter(item => {

          return (

            item.ViTri
            .toLowerCase()
            .includes(keyword)

            ||

            item.PhuTrach
            .toLowerCase()
            .includes(keyword)

          );

        });

        renderData(filtered);

      });

  </script>

</body>

</html>
