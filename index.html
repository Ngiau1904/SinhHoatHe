<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Điểm sinh hoạt hè thiếu nhi</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;

      background:
      linear-gradient(rgba(255,255,255,0.15), rgba(255,255,255,0.15)),
      url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2070&auto=format&fit=crop');

      background-size:cover;
      background-position:center;
      background-attachment:fixed;

      min-height:100vh;

      padding:30px;
    }

    h1{
      text-align:center;
      color:white;

      font-size:45px;

      margin-bottom:40px;

      text-shadow:2px 2px 10px rgba(0,0,0,0.4);
    }

    #list{
      max-width:1000px;
      margin:auto;
    }

    .card{
      background:rgba(255,255,255,0.92);

      border-radius:25px;

      padding:25px;

      margin-bottom:25px;

      box-shadow:0 8px 20px rgba(0,0,0,0.2);

      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px) scale(1.01);
    }

    .card h2{
      color:#ff4081;

      margin-bottom:15px;

      font-size:28px;
    }

    .info{
      margin:10px 0;

      font-size:18px;

      color:#333;

      line-height:1.6;
    }

    .phone{
      color:#0d6efd;
      font-weight:bold;
    }

    .button-group{
      margin-top:20px;

      display:flex;

      gap:10px;

      flex-wrap:wrap;
    }

    .btn{
      border:none;

      padding:12px 18px;

      border-radius:12px;

      cursor:pointer;

      font-size:16px;

      text-decoration:none;

      color:white;

      transition:0.3s;
    }

    .map-btn{
      background:#28a745;
    }

    .call-btn{
      background:#0d6efd;
    }

    .btn:hover{
      opacity:0.85;
    }

    .footer{
      text-align:center;

      margin-top:40px;

      color:white;

      font-size:18px;

      text-shadow:1px 1px 5px rgba(0,0,0,0.5);
    }

    @media(max-width:768px){

      h1{
        font-size:30px;
      }

      .card{
        padding:18px;
      }

      .card h2{
        font-size:22px;
      }

      .info{
        font-size:16px;
      }

    }

  </style>

</head>

<body>

<h1>🌞🌈 Điểm sinh hoạt hè thiếu nhi 🎈🎉</h1>

<div id="list"></div>

<div class="footer">
  ☀️ Chúc các em có một mùa hè thật vui vẻ ☀️
</div>

<script>

fetch('./diem.json')

.then(response => response.json())

.then(data => {

  const list = document.getElementById('list');

  data.forEach(item => {

    list.innerHTML += `

    <div class="card">

      <h2>📍 ${item.stt}. ${item.vitri}</h2>

      <div class="info">
        ⏰ <b>Thời gian:</b> ${item.thoigian}
      </div>

      <div class="info phone">
        📞 <b>SĐT:</b> ${item.sdt}
      </div>

      <div class="info">
        👨‍🏫 <b>Phụ trách:</b> ${item.phutrach}
      </div>

      <div class="button-group">

        <a class="btn call-btn" href="tel:${item.sdt}">
          📞 Gọi điện
        </a>

      </div>

    </div>

    `;
  });

});

</script>

</body>
</html>
